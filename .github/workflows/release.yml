name: Release

# Build Emerald for Linux, macOS and Windows and attach the packages to the
# GitHub Release for the tag. Runs automatically when a v* tag is pushed, or
# manually (Actions > Release > Run workflow) against an existing tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and attach artifacts to (e.g. v1.0.0)'
        required: true
        default: 'v1.3.0'

env:
  QT_VERSION: '6.8.1'

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # qt_arch is empty so install-qt-action auto-detects, except arm64
          # Linux which must be named explicitly. x86_64 builds on 22.04 (older
          # glibc = more portable AppImage); the arm64 Qt 6.8.1 binaries need
          # glibc >= 2.38, so that job uses 24.04-arm (its AppImage in turn
          # needs a reasonably recent glibc).
          - { os: ubuntu-22.04,      name: linux,       cmake_args: '', qt_arch: '' }
          - { os: ubuntu-24.04-arm,  name: linux-arm64, cmake_args: '', qt_arch: 'linux_gcc_arm64' }
          # Build a universal binary so the dmg runs on both Apple Silicon and
          # Intel. The install-qt-action Qt is already universal2, so this only
          # adds the main binary's second slice (negligible size). Single-quote
          # the semicolon list so bash keeps it as one cmake argument.
          # Pinned to macos-14: the migrated macos-latest (macOS 26 / AppleClang
          # 21) SDK dropped the legacy AGL framework that Qt 6.8.1 still links,
          # giving "ld: framework 'AGL' not found". macos-14's SDK still ships it.
          - { os: macos-14,          name: macos,       cmake_args: "-DCMAKE_OSX_ARCHITECTURES='arm64;x86_64'", qt_arch: '' }
          - { os: windows-latest,    name: windows,     cmake_args: '', qt_arch: '' }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Configure & build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}
          cmake --build build --config Release -j

      - name: Package — Linux AppImage
        if: startsWith(matrix.name, 'linux')
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse2 || true
          ./packaging/linux/make_appimage.sh "$PWD/build-appimage"
          mkdir -p dist && mv Emerald-*.AppImage dist/

      - name: Package — macOS dmg
        if: matrix.name == 'macos'
        run: |
          ( cd build && cpack -G DragNDrop )   # runs macdeployqt via install(SCRIPT)
          mkdir -p dist && mv build/*.dmg dist/

      - name: Package — Windows zip
        if: matrix.name == 'windows'
        run: |
          ( cd build && cpack -G ZIP -C Release )   # runs windeployqt via install(SCRIPT)
          mkdir -p dist && mv build/*.zip dist/

      - uses: actions/upload-artifact@v4
        with:
          name: emerald-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            # Per-tag notes live in .github/release-notes/<tag>.md so each release
            # gets its own write-up. (A single shared file silently reused itself
            # across 1.3.0 → 1.4.1, giving them all identical notes.) Fall back to
            # GitHub's auto-generated notes when a tag has no file yet.
            NOTES=".github/release-notes/${TAG}.md"
            if [ -f "$NOTES" ]; then
              gh release create "$TAG" --title "Emerald $TAG" --notes-file "$NOTES"
            else
              gh release create "$TAG" --title "Emerald $TAG" --generate-notes
            fi
          fi
          gh release upload "$TAG" dist/* --clobber
